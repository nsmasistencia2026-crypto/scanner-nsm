<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scanner QR - Asistencia</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
/* Forzar pantalla completa en tableta */
html, body { width:100%; height:100%; }
/* Landscape mode */
@media (orientation: landscape) {
  #reader { height: calc(100vh - 100px) !important; }
}
body { background:#0d0d0d; color:#f0f0f0; font-family:Arial,sans-serif; height:100vh; overflow:hidden; display:flex; flex-direction:column; }
#loginScreen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; padding:24px; background:radial-gradient(ellipse at top,#111827,#0d0d0d); }
.logoTitle { font-size:52px; font-weight:900; color:#2979ff; letter-spacing:6px; text-align:center; line-height:1; }
.logoSub { font-size:12px; color:#555; letter-spacing:3px; text-transform:uppercase; text-align:center; margin:8px 0 40px; }
.loginBox { width:100%; max-width:340px; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:16px; padding:28px 22px; }
.fieldLabel { font-size:11px; color:#666; letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; display:block; }
.fieldInput { width:100%; background:#0d0d0d; border:1px solid #333; border-radius:8px; padding:14px; color:#f0f0f0; font-size:16px; margin-bottom:16px; outline:none; }
.fieldInput:focus { border-color:#2979ff; }
.btnLogin { width:100%; background:#2979ff; color:#fff; border:none; border-radius:8px; padding:16px; font-size:18px; font-weight:700; letter-spacing:2px; cursor:pointer; }
.btnLogin:disabled { opacity:0.4; }
.loginError { background:#3d0011; border:1px solid #ff1744; border-radius:8px; padding:12px; color:#ff1744; font-size:13px; text-align:center; margin-bottom:12px; display:none; }
#scannerScreen { display:none; flex-direction:column; height:100vh; }
.scanHeader { background:#1a1a1a; border-bottom:1px solid #2a2a2a; padding:10px 14px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
.scanHeaderInst { color:#2979ff; font-weight:700; font-size:15px; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.scanHeaderUser b { display:block; color:#f0f0f0; font-size:13px; }
.scanHeaderUser { font-size:11px; color:#555; text-align:right; }
#reader { flex:1; width:100%; background:#000; }
.scanFooter { background:#1a1a1a; border-top:1px solid #2a2a2a; padding:10px 14px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
.footerStatus { font-size:11px; color:#555; }
.footerStatus b { display:block; font-size:13px; font-weight:600; color:#2979ff; }
.btnIcon { background:#0d0d0d; border:1px solid #2a2a2a; border-radius:8px; padding:9px 16px; color:#f0f0f0; font-size:14px; cursor:pointer; font-weight:600; }
.resultOverlay { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.15s; background:rgba(0,0,0,0.85); z-index:999; }
.resultOverlay.show { opacity:1; pointer-events:all; }
.resultCard { width:min(300px,88vw); border-radius:18px; padding:28px 20px; text-align:center; border:2px solid; }
.resultCard.puntual { background:rgba(0,50,20,0.97); border-color:#00e676; }
.resultCard.tarde { background:rgba(50,30,0,0.97); border-color:#ff9100; }
.resultCard.falta { background:rgba(50,0,15,0.97); border-color:#ff1744; }
.resultCard.error { background:rgba(20,20,20,0.97); border-color:#444; }
.resultEstado { font-size:58px; font-weight:900; letter-spacing:4px; line-height:1; margin-bottom:10px; }
.puntual .resultEstado { color:#00e676; }
.tarde .resultEstado { color:#ff9100; }
.falta .resultEstado { color:#ff1744; }
.error .resultEstado { color:#666; font-size:36px; }
.resultId { font-size:26px; font-weight:700; color:rgba(255,255,255,0.5); margin-bottom:4px; }
.resultHora { font-size:15px; color:rgba(255,255,255,0.5); margin-bottom:8px; }
.resultTipo { display:inline-block; font-size:11px; padding:4px 12px; border-radius:20px; background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.4); }
.resultMsg { font-size:13px; color:rgba(255,255,255,0.6); margin-top:10px; }
.noInternet { position:fixed; top:0; left:0; right:0; background:#ff1744; color:#fff; text-align:center; padding:10px; font-weight:700; font-size:13px; display:none; z-index:9999; }
</style>
</head>
<body>

<div class="noInternet" id="noInternet">SIN CONEXION</div>

<div id="loginScreen">
  <div class="logoTitle">ASIST<br>QR</div>
  <div class="logoSub">Control de Asistencia</div>
  <div class="loginBox">
    <div class="loginError" id="loginError"></div>
    <label class="fieldLabel">Usuario</label>
    <input class="fieldInput" type="text" id="inpUsuario" autocapitalize="none" placeholder="usuario">
    <label class="fieldLabel">Contrasena</label>
    <input class="fieldInput" type="password" id="inpClave" placeholder=".........">
    <button class="btnLogin" id="btnLogin">INGRESAR</button>
  </div>
</div>

<div id="scannerScreen">
  <div class="scanHeader">
    <div class="scanHeaderInst" id="hdrInst">ASIST QR</div>
    <div class="scanHeaderUser"><b id="hdrNombre">---</b><span id="hdrRol"></span></div>
  </div>
  <div id="reader"></div>
  <div class="scanFooter">
    <div class="footerStatus">Estado<b id="ftrStatus">Iniciando...</b></div>
    <div class="footerBtns">
      <button class="btnIcon" id="btnRotar">ROTAR</button>
      <button class="btnIcon" id="btnSalir">SALIR</button>
    </div>
  </div>
</div>

<div class="resultOverlay" id="resultOverlay">
  <div class="resultCard" id="resultCard">
    <div class="resultEstado" id="resEstado">---</div>
    <div class="resultId" id="resId">ID: ---</div>
    <div class="resultHora" id="resHora">--:--:--</div>
    <div class="resultTipo" id="resTipo">ENTRADA</div>
    <div class="resultMsg" id="resMsg"></div>
  </div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
var TOKEN = null;
var ONLINE = navigator.onLine;
var html5QrcodeScanner = null;
var PROCESANDO = false;
var ULTIMO_ID = null;
var ULTIMO_TIME = 0;
var TIMER_RES = null;

var WEBAPP_URL = "https://script.google.com/macros/s/AKfycbztLf6CwY61Uu_nLi-w50Yf1cXjxO5hia_gWY3WEXRllwwfnE5JaGgwEAHWKXWn82QL/exec";

function playTone(f,t,d,g,dl){
  try{
    var c=new(window.AudioContext||window.webkitAudioContext)();
    var o=c.createOscillator(),gn=c.createGain();
    o.connect(gn);gn.connect(c.destination);
    o.type=t;o.frequency.value=f;dl=dl||0;
    gn.gain.setValueAtTime(g,c.currentTime+dl);
    gn.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dl+d);
    o.start(c.currentTime+dl);o.stop(c.currentTime+dl+d);
  }catch(e){}
}
function sndPuntual(){playTone(880,"sine",0.2,0.4);playTone(1100,"sine",0.2,0.3,0.2);}
function sndTarde(){playTone(440,"triangle",0.3,0.5);playTone(350,"triangle",0.3,0.3,0.3);}
function sndError(){playTone(200,"sawtooth",0.2,0.5);playTone(150,"sawtooth",0.2,0.4,0.2);}

function checkNet(){
  ONLINE=navigator.onLine;
  document.getElementById("noInternet").style.display=ONLINE?"none":"block";
}
window.addEventListener("online",checkNet);
window.addEventListener("offline",checkNet);
setInterval(checkNet,5000);

function llamarServidor(accion,datos){
  var p=new URLSearchParams({action:accion});
  if(datos) Object.keys(datos).forEach(function(k){p.append(k,datos[k]);});
  // Cache busting para evitar respuestas cacheadas
  p.append("_t", Date.now());
  return fetch(WEBAPP_URL+"?"+p.toString(), {
    method: "GET",
    cache: "no-store",
    headers: {"Cache-Control": "no-cache, no-store, must-revalidate"}
  }).then(function(r){ return r.json(); });
}

window.onload=function(){
  checkNet();
  document.getElementById("btnLogin").onclick=handleLogin;
  document.getElementById("inpClave").onkeydown=function(e){if(e.key==="Enter")handleLogin();};
  document.getElementById("btnSalir").onclick=salir;
  document.getElementById("btnRotar").onclick=rotarPantalla;
  var t=sessionStorage.getItem("qr_token");
  if(t){TOKEN=t;abrirScanner({nombre:sessionStorage.getItem("qr_nombre")||"",rol:sessionStorage.getItem("qr_rol")||"",institucion:sessionStorage.getItem("qr_inst")||""});}
};

function handleLogin(){
  if(!ONLINE){mostrarError("Sin conexion");return;}
  var u=document.getElementById("inpUsuario").value.trim();
  var p=document.getElementById("inpClave").value.trim();
  if(!u||!p){mostrarError("Ingresa usuario y contrasena");return;}
  var btn=document.getElementById("btnLogin");
  btn.disabled=true;btn.textContent="VERIFICANDO...";
  llamarServidor("login",{usuario:u,clave:p})
    .then(function(res){
      btn.disabled=false;btn.textContent="INGRESAR";
      if(!res.ok){mostrarError(res.mensaje||"Error");sndError();return;}
      TOKEN=res.token;
      sessionStorage.setItem("qr_token", res.token);
      sessionStorage.setItem("qr_usuario", document.getElementById("inpUsuario").value.trim());
      sessionStorage.setItem("qr_clave", document.getElementById("inpClave").value.trim());
      sessionStorage.setItem("qr_nombre", res.nombre||"");
      sessionStorage.setItem("qr_rol", res.rol||"");
      sessionStorage.setItem("qr_inst", res.institucion||"");
      abrirScanner(res);
    })
    .catch(function(){btn.disabled=false;btn.textContent="INGRESAR";mostrarError("Error de conexion");sndError();});
}

function mostrarError(msg){
  var el=document.getElementById("loginError");
  el.textContent=msg;el.style.display="block";
}

function abrirScanner(datos){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("scannerScreen").style.display="flex";
  document.getElementById("hdrInst").textContent=datos.institucion||"ASIST QR";
  document.getElementById("hdrNombre").textContent=datos.nombre||"";
  document.getElementById("hdrRol").textContent=datos.rol||"";
  iniciarScanner();
}

function iniciarScanner(){
  var st=document.getElementById("ftrStatus");
  st.textContent="Iniciando...";

  // Usar Html5QrcodeScanner que es mas simple y confiable
  // Usar Html5Qrcode directamente para control total
  var html5Qrcode = new Html5Qrcode("reader");
  
  Html5Qrcode.getCameras().then(function(cameras) {
    if (!cameras || cameras.length === 0) {
      st.textContent = "No se encontro camara";
      return;
    }
    
    // Preferir camara frontal
    var cameraId = cameras[0].id;
    for (var i = 0; i < cameras.length; i++) {
      if (cameras[i].label && cameras[i].label.toLowerCase().indexOf("front") >= 0) {
        cameraId = cameras[i].id;
        break;
      }
    }

    var config = {
      fps: 15,
      qrbox: function(w, h) {
        return { width: Math.floor(w * 0.9), height: Math.floor(h * 0.9) };
      },
      aspectRatio: window.screen.height / window.screen.width
    };

    html5Qrcode.start(
      cameraId,
      config,
      function(decodedText) { onQRDetected(decodedText); },
      function() {}
    ).then(function() {
      st.textContent = "Escaneando...";
      html5QrcodeScanner = html5Qrcode;
    }).catch(function(err) {
      // Si falla con camara especifica, usar facingMode
      html5Qrcode.start(
        { facingMode: "user" },
        config,
        function(decodedText) { onQRDetected(decodedText); },
        function() {}
      ).then(function() {
        st.textContent = "Escaneando...";
        html5QrcodeScanner = html5Qrcode;
      }).catch(function(e) {
        st.textContent = "Error camara: " + e;
      });
    });
  }).catch(function(err) {
    st.textContent = "Error: " + err;
  });
}

function onQRDetected(texto){
  if(PROCESANDO) return;
  var now=Date.now();
  if(texto===ULTIMO_ID && now-ULTIMO_TIME<3000) return;
  ULTIMO_ID=texto;
  ULTIMO_TIME=now;
  if(!ONLINE){mostrarResultado({ok:false,tipo:"ERROR",mensaje:"Sin conexion"},texto);sndError();return;}
  PROCESANDO=true;
  document.getElementById("ftrStatus").textContent="Procesando...";

  var u = sessionStorage.getItem("qr_usuario");
  var p = sessionStorage.getItem("qr_clave");

  // Siempre hacer login fresco antes de escanear para garantizar token valido
  llamarServidor("login", {usuario: u, clave: p})
    .then(function(loginRes) {
      if (!loginRes.ok) {
        mostrarResultado({ok:false, tipo:"ERROR", mensaje:"Error de sesion. Reinicia la app."}, texto);
        sndError();
        return;
      }
      TOKEN = loginRes.token;
      sessionStorage.setItem("qr_token", loginRes.token);
      // Ahora escanear con token fresco
      return llamarServidor("escanear", {token: TOKEN, id: texto.trim()});
    })
    .then(function(res) {
      if (!res) return;
      console.log("RESPUESTA SERVIDOR:", JSON.stringify(res));
      mostrarResultado(res, texto);
      if(res.ok) {
        if(res.estado==="PUNTUAL") sndPuntual();
        else if(res.estado==="TARDE") sndTarde();
        else sndError();
      } else {
        sndError();
      }
    })
    .catch(function(err) {
      mostrarResultado({ok:false, tipo:"ERROR", mensaje:"Error: "+err.message}, texto);
      sndError();
    });
}

function mostrarResultado(res,id){
  var overlay=document.getElementById("resultOverlay");
  var card=document.getElementById("resultCard");
  card.className="resultCard";
  if(res.ok){
    var e=(res.estado||"").toUpperCase();
    document.getElementById("resEstado").textContent=e;
    document.getElementById("resId").textContent="ID: "+(res.id||id);
    document.getElementById("resHora").textContent=res.hora||hora();
    document.getElementById("resTipo").textContent=res.tipo||"ENTRADA";
    document.getElementById("resMsg").textContent=res.duplicado?"Registro duplicado":"";
    card.classList.add(e==="PUNTUAL"?"puntual":e==="TARDE"?"tarde":"falta");
  } else {
    var tipoError = (res.tipo === "FUERA_HORARIO") ? "FUERA DE HORARIO" : "ERROR";
    document.getElementById("resEstado").textContent = tipoError;
    document.getElementById("resId").textContent = "ID: "+(id||"---");
    document.getElementById("resHora").textContent = hora();
    document.getElementById("resTipo").textContent = res.tipo||"ERROR";
    document.getElementById("resMsg").textContent = res.mensaje||"Error";
    card.classList.add("error");
  }
  overlay.classList.add("show");
  clearTimeout(TIMER_RES);
  TIMER_RES=setTimeout(function(){
    overlay.classList.remove("show");
    PROCESANDO=false;
    ULTIMO_ID=null;
    document.getElementById("ftrStatus").textContent="Escaneando...";
  },2500);
}

function hora(){return new Date().toLocaleTimeString("es-PE",{hour12:false});}

function rotarPantalla(){
  var body = document.body;
  var current = body.style.transform;
  if(current === "rotate(90deg) translateY(-100%)") {
    body.style.transform = "";
    body.style.transformOrigin = "";
    body.style.width = "";
    body.style.height = "";
    body.style.position = "";
  } else {
    body.style.transform = "rotate(90deg) translateY(-100%)";
    body.style.transformOrigin = "top left";
    body.style.width = "100vh";
    body.style.height = "100vw";
    body.style.position = "absolute";
  }
}

function salir(){
  if(!confirm("Cerrar sesion?")) return;
  sessionStorage.clear();TOKEN=null;
  if(html5QrcodeScanner) html5QrcodeScanner.clear().catch(function(){});
  document.getElementById("scannerScreen").style.display="none";
  document.getElementById("loginScreen").style.display="flex";
  document.getElementById("inpUsuario").value="";
  document.getElementById("inpClave").value="";
  document.getElementById("loginError").style.display="none";
}
</script>
</body>
</html>
